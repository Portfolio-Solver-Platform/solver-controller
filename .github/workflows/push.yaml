name: Publish Docker image

on:
  push:
    branches: [ main ]

jobs:
  ci:
    uses: ./.github/workflows/ci.yaml

  push:
    needs: ci

    permissions:
      contents: read
      packages: write

    uses: Portfolio-Solver-Platform/infrastructure/.github/workflows/push-image.yaml@main
    with:
      image_name: solver-controller
